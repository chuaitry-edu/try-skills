<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="28" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="620" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">try-skills 关系图</text>

  <!-- try router (center top) -->
  <rect x="300" y="60" width="200" height="56" rx="28" fill="#238636" stroke="#2ea043" stroke-width="2"/>
  <text x="400" y="94" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">try 总路由器</text>

  <!-- skill nodes (row 2) -->
  <rect x="50" y="180" width="180" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="210" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">try-plan</text>

  <rect x="240" y="180" width="180" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="210" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">try-stretch</text>

  <rect x="430" y="180" width="180" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="520" y="210" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">try-method</text>

  <!-- try-task (row 3) -->
  <rect x="240" y="310" width="180" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="340" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">try-task</text>

  <!-- try-review (row 4) -->
  <rect x="240" y="440" width="180" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="470" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">try-review</text>

  <!-- Arrows from try to row2 -->
  <line x1="330" y1="116" x2="180" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="116" x2="350" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="116" x2="470" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows row2 → try-task -->
  <line x1="200" y1="228" x2="310" y2="308" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="230" x2="330" y2="308" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="228" x2="360" y2="308" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow try-task → try-review -->
  <line x1="330" y1="360" x2="330" y2="438" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feedback loop -->
  <path d="M500,465 Q620,465 620,340 Q620,200 560,178" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="630" y="340" fill="#d29922" font-size="11" transform="rotate(90,630,340)">反馈循环</text>

  <!-- Labels -->
  <text x="80" y="260" fill="#8b949e" font-size="11">第一阶段：</text>
  <text x="80" y="275" fill="#8b949e" font-size="11">定方向/定难度/定学法</text>

  <text x="80" y="390" fill="#8b949e" font-size="11">第二阶段：</text>
  <text x="80" y="405" fill="#8b949e" font-size="11">执行：每日任务</text>

  <text x="80" y="520" fill="#8b949e" font-size="11">第三阶段：</text>
  <text x="80" y="535" fill="#8b949e" font-size="11">巩固：复习复盘</text>

  <!-- Legend -->
  <rect x="570" y="520" width="220" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="580" y="545" fill="#8b949e" font-size="11" font-weight="bold">图例</text>
  <line x1="580" y1="565" x2="620" y2="565" stroke="#666" stroke-width="1.5"/>
  <text x="625" y="569" fill="#8b949e" font-size="11">流程方向</text>
  <line x1="580" y1="585" x2="620" y2="585" stroke="#d29922" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="625" y="589" fill="#8b949e" font-size="11">反馈循环</text>
</svg>
